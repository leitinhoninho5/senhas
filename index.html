<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Exclusivos do Jair</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎮 Exclusivos do Jair</h1>
        <p>Personalize o personagem!</p>
    </header>

    <main>

        <div class="personagem">

            <!-- Foto principal -->
            <img
                src="img/foto.png"
                id="foto"
                class="foto"
            >

            <!-- Acessórios -->

            <div id="bone" class="acessorio bone hidden"></div>

            <div id="oculos" class="acessorio oculos hidden"></div>

            <div id="bigode" class="acessorio bigode hidden"></div>

            <div id="barba" class="acessorio barba hidden"></div>

            <div id="coroa" class="acessorio coroa hidden"></div>

            <div id="laco" class="acessorio laco hidden"></div>

            <div id="nariz" class="acessorio nariz hidden"></div>

        </div>

        <div class="botoes">

            <button onclick="toggle('bone')">
                🧢 Boné
            </button>

            <button onclick="toggle('oculos')">
                🕶 Óculos
            </button>

            <button onclick="toggle('bigode')">
                👨 Bigode
            </button>

            <button onclick="toggle('barba')">
                🧔 Barba
            </button>

            <button onclick="toggle('coroa')">
                👑 Coroa
            </button>

            <button onclick="toggle('laco')">
                🎀 Laço
            </button>

            <button onclick="toggle('nariz')">
                🤡 Nariz
            </button>

            <button onclick="visualAleatorio()">
                🎲 Aleatório
            </button>

            <button onclick="resetar()">
                🔄 Resetar
            </button>

        </div>

    </main>

    <footer>

        Feito com HTML, CSS e JavaScript

    </footer>

<script src="script.js"></script>

</body>
</html>
