<title>Login Seguro</title><style>
body{
    background:#0f172a;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
}

.login{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    color:white;
    box-shadow:0 0 25px rgba(0,0,0,.4);
    z-index:10;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

#msg{
    margin-top:15px;
    font-weight:bold;
    min-height:60px;
}

#foto{
    display:none;
    width:220px;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border-radius:15px;
    border:4px solid white;
    z-index:999;
}

.girando{
    animation:girarTela 8s linear infinite;
}

@keyframes girarTela{

0%{
left:10%;
top:10%;
transform:rotate(0deg);
}

25%{
left:80%;
top:10%;
transform:rotate(90deg);
}

50%{
left:80%;
top:75%;
transform:rotate(180deg);
}

75%{
left:10%;
top:75%;
transform:rotate(270deg);
}

100%{
left:10%;
top:10%;
transform:rotate(360deg);
}

}

.msgDoida{
    position:fixed;
    color:#ff3b3b;
    font-size:28px;
    font-weight:bold;
    text-shadow:0 0 10px white;
    pointer-events:none;
    z-index:998;
}

.piscando{
    animation:piscar .2s infinite;
}

@keyframes piscar{
0%{background:#0f172a;}
50%{background:#4a0000;}
100%{background:#0f172a;}
}
