<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Seguro</title>

<style>
body{
    background:#0f172a;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    color:white;
    box-shadow:0 0 25px rgba(0,0,0,.4);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

#msg{
    margin-top:15px;
    color:#ff6b6b;
    font-weight:bold;
}

#foto{
    display:none;
    width:220px;
    margin-top:15px;
    border-radius:15px;
    border:3px solid white;
}
</style>
</head>
<body>

<div class="login">

    <h2>Login Seguro 🔒</h2>

    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>

    <div id="msg"></div>

    <img
        id="foto"
        src="https://i.imgur.com/QJDn6fS.jpeg"
        alt="Jairfemboy666"
    >

</div>

<script>
function entrar(){

    const senha = document.getElementById("pass").value;

    document.getElementById("msg").innerHTML =
    `🚨 ALERTA DE SEGURANÇA 🚨<br><br>
    A senha "<b>${senha}</b>" já pertence ao usuário
    <b>Jairfemboy666</b>.`;

    document.getElementById("foto").style.display = "block";
}
</script>

</body>
</html>
